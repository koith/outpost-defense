<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>OUTPOST: LAST STAND</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Courier New',monospace; touch-action:none; }
canvas { display:block; position:fixed; top:0; left:0; }
#hud {
  position:fixed; top:0; left:0; right:0; z-index:10; pointer-events:none;
  display:flex; justify-content:space-between; padding:10px 14px;
}
.hp { background:rgba(0,0,0,0.75); border:1px solid rgba(100,200,60,0.5);
  border-radius:6px; padding:5px 12px; color:#90ee40; font-size:11px; letter-spacing:1px; }
.hp span { font-size:18px; font-weight:bold; color:#b8ff50; display:block; }
#hpbar { position:fixed; bottom:0; left:0; right:0; height:5px; background:#111; z-index:10; pointer-events:none; }
#hpfill { height:100%; background:linear-gradient(90deg,#ff2020,#ff8800,#90ee40); background-size:300% 100%; transition:width .3s; }
#ammorow { position:fixed; bottom:8px; right:12px; display:flex; gap:3px; z-index:10; pointer-events:none; }
.atick { width:4px; height:16px; background:#b8ff50; border-radius:2px; transition:background .1s; }
.atick.spent { background:rgba(180,255,80,.15); }
#banner { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:26px; font-weight:bold; letter-spacing:4px; color:#fff;
  text-shadow:0 0 20px #ff6600; opacity:0; pointer-events:none; z-index:20;
  transition:opacity .3s; text-align:center; white-space:nowrap; }
#killfeed { position:fixed; top:68px; left:12px; z-index:10; pointer-events:none; }
.km { background:rgba(0,0,0,.7); border-left:2px solid #ff4444;
  color:rgba(255,200,80,.9); font-size:10px; letter-spacing:1px;
  padding:3px 8px; border-radius:0 4px 4px 0; margin-bottom:3px;
  animation:fk 2.5s forwards; }
@keyframes fk { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.9);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:100; color:#fff;
}
#overlay h1 { font-size:34px; letter-spacing:6px; color:#b8ff50; text-shadow:0 0 30px #90ee40; margin-bottom:6px; }
.sub { color:rgba(255,255,255,.35); font-size:10px; letter-spacing:3px; margin-bottom:36px; }
.btn { background:transparent; border:1px solid #90ee40; color:#b8ff50;
  font-family:inherit; font-size:13px; letter-spacing:3px;
  padding:14px 42px; cursor:pointer; margin:6px; border-radius:4px; }
.btn:active { background:rgba(144,238,64,.15); }
.sgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0; width:240px; }
.sbox { background:rgba(144,238,64,.06); border:1px solid rgba(144,238,64,.2);
  border-radius:6px; padding:10px; text-align:center; }
.sbox .sl { color:rgba(255,255,255,.3); font-size:9px; letter-spacing:2px; }
.sbox .sv { color:#b8ff50; font-size:20px; font-weight:bold; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hp"><span id="wn">1</span>WAVE</div>
  <div class="hp" style="text-align:center"><span id="hn">100</span>OUTPOST HP</div>
  <div class="hp" style="text-align:right"><span id="kn">0</span>KILLS</div>
</div>
<div id="hpbar"><div id="hpfill" style="width:100%"></div></div>
<div id="ammorow"></div>
<div id="banner"></div>
<div id="killfeed"></div>

<div id="overlay">
  <h1>OUTPOST</h1>
  <div class="sub">LAST STAND · 최후의 초소</div>
  <div style="color:rgba(255,255,255,.45);font-size:11px;text-align:center;margin-bottom:28px;line-height:2;letter-spacing:1px">
    터치/드래그 → 포탑 조준 & 사격<br>적 좀비로부터 초소를 지켜라
  </div>
  <button class="btn" onclick="startGame()">▶ START MISSION</button>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  OUTPOST: LAST STAND — Canvas 2D · Safari 완벽 호환
//  [ASSET] 주석 위치에서 이미지/사운드 교체 가능
// ═══════════════════════════════════════════════════════

const CFG = {
  OUTPOST_HP: 100,
  MAX_AMMO: 20,
  RELOAD_MS: 1800,
  FIRE_RATE_MS: 130,
  BULLET_SPEED: 520,
  BULLET_DMG: 14,
  ARENA_R: 0.42,   // fraction of min(W,H)
  WAVES: [
    { count:8,  hp:30, speed:55, type:'basic'  },
    { count:14, hp:55, speed:80, type:'runner' },
    { count:22, hp:95, speed:60, type:'brute'  },
  ]
};

// ── State ──
let W, H, cx, cy, R;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let outpostAngle = 0;
let turretAngle = 0, targetAngle = 0;
let bullets = [], enemies = [], particles = [], trees = [];
let hp = 100, kills = 0, ammo = CFG.MAX_AMMO;
let waveIdx = 0, enemiesLeft = 0, waveActive = false;
let isReloading = false, reloadTimer = 0;
let lastFire = 0;
let touchX = null, touchY = null;
let gameRunning = false;
let raf;
let lastTime = 0;
let screenShake = 0;

// ── Audio (Web Audio synth) ──
let audioCtx;
function sfx(type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    if (type==='shoot') {
      o.type='sawtooth'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(70,t+.09);
      g.gain.setValueAtTime(.2,t); g.gain.exponentialRampToValueAtTime(.001,t+.11);
      o.start(t); o.stop(t+.13);
    } else if (type==='hit') {
      o.type='square'; o.frequency.setValueAtTime(120,t);
      g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.001,t+.14);
      o.start(t); o.stop(t+.16);
    } else if (type==='die') {
      o.type='sawtooth'; o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(35,t+.38);
      g.gain.setValueAtTime(.28,t); g.gain.exponentialRampToValueAtTime(.001,t+.4);
      o.start(t); o.stop(t+.42);
    } else if (type==='reload') {
      o.type='sine'; o.frequency.setValueAtTime(500,t); o.frequency.exponentialRampToValueAtTime(800,t+.18);
      g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.22);
      o.start(t); o.stop(t+.24);
    }
  } catch(e){}
}

// ── Resize ──
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
  R = Math.min(W,H) * CFG.ARENA_R;
  buildTrees();
}

function buildTrees() {
  trees = [];
  const n = 32;
  for (let i=0; i<n; i++) {
    const a = (i/n)*Math.PI*2 + Math.random()*.3;
    const r = R + 18 + Math.random()*40;
    trees.push({
      x: cx + Math.cos(a)*r, y: cy + Math.sin(a)*r,
      r: 6 + Math.random()*10,
      hue: 100 + Math.random()*40,
      dark: .12 + Math.random()*.1
    });
  }
}

// ── Ammo bar ──
function buildAmmoBar() {
  const el = document.getElementById('ammorow');
  el.innerHTML = '';
  for (let i=0; i<CFG.MAX_AMMO; i++) {
    const d = document.createElement('div');
    d.className='atick'; d.id='a'+i; el.appendChild(d);
  }
}
function updateAmmoBar() {
  for (let i=0; i<CFG.MAX_AMMO; i++) {
    const e = document.getElementById('a'+i);
    if (e) e.className = 'atick'+(i<ammo?'':' spent');
  }
}

// ── HUD ──
function updateHUD() {
  document.getElementById('wn').textContent = Math.min(waveIdx+1, CFG.WAVES.length);
  document.getElementById('hn').textContent = hp;
  document.getElementById('kn').textContent = kills;
  document.getElementById('hpfill').style.width = (hp/CFG.OUTPOST_HP*100)+'%';
}

// ── Banner ──
let bannerTimer;
function showBanner(txt, col='#fff') {
  const el = document.getElementById('banner');
  el.textContent = txt; el.style.color = col; el.style.opacity = '1';
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(()=>el.style.opacity='0', 1800);
}

// ── Kill feed ──
function killMsg(type) {
  const labels = {basic:'ZOMBIE DOWN', runner:'RUNNER ELIMINATED', brute:'BRUTE DESTROYED'};
  const feed = document.getElementById('killfeed');
  const d = document.createElement('div');
  d.className='km'; d.textContent = labels[type]||'KILL';
  feed.appendChild(d);
  setTimeout(()=>{ if(d.parentNode) d.parentNode.removeChild(d); }, 2600);
}

// ── Input ──
function setupInput() {
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.touches[0]; touchX=t.clientX; touchY=t.clientY; }, {passive:false});
  canvas.addEventListener('touchmove',  e=>{ e.preventDefault(); const t=e.touches[0]; touchX=t.clientX; touchY=t.clientY; }, {passive:false});
  canvas.addEventListener('touchend',   e=>{ e.preventDefault(); touchX=touchY=null; }, {passive:false});
  canvas.addEventListener('mousedown',  e=>{ touchX=e.clientX; touchY=e.clientY; });
  canvas.addEventListener('mousemove',  e=>{ if(e.buttons) { touchX=e.clientX; touchY=e.clientY; }});
  canvas.addEventListener('mouseup',    ()=>{ touchX=touchY=null; });
}

// ── Particles ──
function spawnParticles(x,y,col,n,spd,life) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=spd*(0.4+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,col,r:2+Math.random()*3});
  }
}
function spawnRing(x,y,col) {
  particles.push({x,y,ring:true,r:4,maxR:28,life:.35,maxLife:.35,col});
}
function spawnMuzzle(x,y,angle) {
  for(let i=0;i<5;i++) {
    const a=angle+(Math.random()-.5)*.6, s=180+Math.random()*120;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.14,maxLife:.14,col:'#ffe566',r:3+Math.random()*3});
  }
}

// ── Bullets ──
function fireBullet() {
  if(ammo<=0||isReloading) return;
  const now=performance.now();
  if(now-lastFire<CFG.FIRE_RATE_MS) return;
  lastFire=now; ammo--;
  updateAmmoBar(); sfx('shoot');
  const tip = { x: cx+Math.cos(turretAngle)*36, y: cy+Math.sin(turretAngle)*36 };
  spawnMuzzle(tip.x, tip.y, turretAngle);
  bullets.push({ x:tip.x, y:tip.y, vx:Math.cos(turretAngle)*CFG.BULLET_SPEED, vy:Math.sin(turretAngle)*CFG.BULLET_SPEED, life:1.2 });
  screenShake = Math.max(screenShake, 3);
  if(ammo===0) startReload();
}
function startReload() {
  isReloading=true; sfx('reload'); reloadTimer=CFG.RELOAD_MS;
  showBanner('RELOADING...','#ffaa00');
}

// ── Enemies ──
function spawnEnemy(waveDef) {
  const a = Math.random()*Math.PI*2;
  const r = R + 10;
  const colors = {basic:'#6a8844', runner:'#cc6633', brute:'#554433'};
  const sizes  = {basic:14, runner:11, brute:20};
  enemies.push({
    x: cx+Math.cos(a)*r, y: cy+Math.sin(a)*r,
    hp: waveDef.hp, maxHp: waveDef.hp,
    speed: waveDef.speed,
    type: waveDef.type,
    col: colors[waveDef.type],
    r: sizes[waveDef.type],
    angle: 0, bobT: Math.random()*Math.PI*2,
    hitFlash: 0, dead: false,
    attackTimer: 0
  });
}

function startWave() {
  if(waveIdx>=CFG.WAVES.length){ winGame(); return; }
  const w = CFG.WAVES[waveIdx];
  enemiesLeft = w.count; waveActive = true;
  showBanner('WAVE '+(waveIdx+1),'#ff9900');
  let spawned=0;
  const iv = setInterval(()=>{
    if(!gameRunning){ clearInterval(iv); return; }
    if(spawned>=w.count){ clearInterval(iv); return; }
    spawnEnemy(w); spawned++;
  }, 550);
}

// ── Main loop ──
function loop(ts) {
  raf = requestAnimationFrame(loop);
  if(!gameRunning) return;
  const dt = Math.min((ts-lastTime)/1000, .05);
  lastTime = ts;

  // Reload
  if(isReloading) {
    reloadTimer -= dt*1000;
    if(reloadTimer<=0){ isReloading=false; ammo=CFG.MAX_AMMO; updateAmmoBar(); }
  }

  // Turret aim
  if(touchX!==null) {
    targetAngle = Math.atan2(touchY-cy, touchX-cx);
    fireBullet();
  }
  // Smooth rotation
  let diff = targetAngle - turretAngle;
  while(diff> Math.PI) diff-=Math.PI*2;
  while(diff<-Math.PI) diff+=Math.PI*2;
  turretAngle += diff * Math.min(dt*14,1);
  outpostAngle += dt * .04;

  // Bullets
  for(let i=bullets.length-1;i>=0;i--) {
    const b=bullets[i];
    b.life-=dt; b.x+=b.vx*dt; b.y+=b.vy*dt;
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--) {
      const e=enemies[j]; if(e.dead) continue;
      const dx=b.x-e.x, dy=b.y-e.y;
      if(dx*dx+dy*dy<(e.r+4)*(e.r+4)) {
        hit=true; e.hp-=CFG.BULLET_DMG; sfx('hit');
        e.hitFlash=.12;
        spawnRing(b.x,b.y,'rgba(255,160,0,.8)');
        screenShake=Math.max(screenShake,2);
        if(e.hp<=0) killEnemy(j);
        break;
      }
    }
    if(hit||b.life<=0) bullets.splice(i,1);
  }

  // Enemies
  for(let i=enemies.length-1;i>=0;i--) {
    const e=enemies[i]; if(e.dead) continue;
    const dx=cx-e.x, dy=cy-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    e.angle=Math.atan2(dy,dx);
    if(dist>18) {
      e.x+=Math.cos(e.angle)*e.speed*dt;
      e.y+=Math.sin(e.angle)*e.speed*dt;
    } else {
      e.attackTimer+=dt;
      if(e.attackTimer>=1.0) {
        e.attackTimer=0;
        const dmg = e.type==='brute'?14:e.type==='runner'?5:8;
        hp=Math.max(0,hp-dmg); updateHUD(); screenShake=5;
        if(hp<=0){ gameOver(); return; }
      }
    }
    e.bobT+=dt*6;
    if(e.hitFlash>0) e.hitFlash-=dt;
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.life-=dt;
    if(p.life<=0){ particles.splice(i,1); continue; }
    if(!p.ring){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; }
    else { p.r += (p.maxR-4)*(dt/p.maxLife)*3; }
  }

  // Screen shake decay
  screenShake=Math.max(0,screenShake-dt*18);

  draw();
}

// ── Draw ──
function draw() {
  // Shake offset
  const sx = screenShake>0?(Math.random()-.5)*screenShake*2:0;
  const sy = screenShake>0?(Math.random()-.5)*screenShake*2:0;
  ctx.save();
  ctx.translate(sx,sy);

  // Background
  ctx.fillStyle='#0d1a08';
  ctx.fillRect(-10,-10,W+20,H+20);

  // Arena ground
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,R+50);
  grd.addColorStop(0,'#1c2e10'); grd.addColorStop(.7,'#162408'); grd.addColorStop(1,'#0d1a08');
  ctx.beginPath(); ctx.arc(cx,cy,R+60,0,Math.PI*2);
  ctx.fillStyle=grd; ctx.fill();

  // Tactical grid rings
  ctx.strokeStyle='rgba(60,100,30,.25)'; ctx.lineWidth=1;
  for(let r=R*.33;r<=R+2;r+=R*.33) {
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
  }
  // Radial lines
  for(let i=0;i<12;i++) {
    const a=(i/12)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*(R+2),cy+Math.sin(a)*(R+2));
    ctx.stroke();
  }

  // Trees
  for(const t of trees) {
    // shadow
    ctx.beginPath(); ctx.ellipse(t.x+4,t.y+5,t.r*.7,t.r*.4,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fill();
    // trunk
    ctx.beginPath(); ctx.arc(t.x,t.y,t.r*.35,0,Math.PI*2);
    ctx.fillStyle=`hsl(30,40%,18%)`; ctx.fill();
    // canopy
    ctx.beginPath(); ctx.arc(t.x,t.y-t.r*.3,t.r,0,Math.PI*2);
    ctx.fillStyle=`hsl(${t.hue},55%,${Math.floor(t.dark*100)}%)`; ctx.fill();
    ctx.beginPath(); ctx.arc(t.x-t.r*.3,t.y-t.r*.15,t.r*.7,0,Math.PI*2);
    ctx.fillStyle=`hsl(${t.hue+10},60%,${Math.floor((t.dark+.04)*100)}%)`; ctx.fill();
  }

  // Arena edge glow
  const edgeGrd=ctx.createRadialGradient(cx,cy,R-8,cx,cy,R+20);
  edgeGrd.addColorStop(0,'rgba(0,0,0,0)'); edgeGrd.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.beginPath(); ctx.arc(cx,cy,R+20,0,Math.PI*2);
  ctx.fillStyle=edgeGrd; ctx.fill();

  // Enemies (draw behind outpost)
  for(const e of enemies) {
    if(e.dead) continue;
    const bobY = Math.sin(e.bobT)*2;
    ctx.save(); ctx.translate(e.x, e.y+bobY); ctx.rotate(e.angle+Math.PI/2);

    // Shadow
    ctx.beginPath(); ctx.ellipse(0,e.r*.6,e.r*.7,e.r*.3,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,.4)'; ctx.fill();

    // HP bar
    const bw=e.r*2.2;
    ctx.fillStyle='rgba(0,0,0,.6)';
    ctx.fillRect(-bw/2,-e.r-10,bw,5);
    ctx.fillStyle=e.hp/e.maxHp>.5?'#60cc20':'#ff4400';
    ctx.fillRect(-bw/2,-e.r-10,bw*(e.hp/e.maxHp),5);

    // Body
    const flash=e.hitFlash>0;
    ctx.fillStyle=flash?'#ff6666':e.col;
    if(e.type==='brute') {
      ctx.fillRect(-e.r*.7,-e.r*.8,e.r*1.4,e.r*1.6);
    } else {
      ctx.beginPath(); ctx.ellipse(0,0,e.r*.7,e.r*.9,0,0,Math.PI*2);
      ctx.fill();
    }
    // Head
    ctx.fillStyle=flash?'#ffaaaa':`hsl(${e.type==='runner'?25:100},35%,30%)`;
    ctx.beginPath(); ctx.arc(0,-e.r*.75,e.r*.45,0,Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle='#ff2200';
    ctx.beginPath(); ctx.arc(-e.r*.16,-e.r*.8,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( e.r*.16,-e.r*.8,2.5,0,Math.PI*2); ctx.fill();
    // Arms
    ctx.strokeStyle=flash?'#ff8888':e.col; ctx.lineWidth=e.r*.35;
    ctx.beginPath(); ctx.moveTo(-e.r*.6,0); ctx.lineTo(-e.r*1.1,e.r*.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( e.r*.6,0); ctx.lineTo( e.r*1.1,e.r*.5); ctx.stroke();

    ctx.restore();
  }

  // Particles (behind outpost)
  for(const p of particles) {
    const t=p.life/p.maxLife;
    if(p.ring) {
      ctx.strokeStyle=p.col; ctx.lineWidth=2.5*t;
      ctx.globalAlpha=t*.85;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
    } else {
      ctx.globalAlpha=t*.9;
      ctx.fillStyle=p.col;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*t+.5,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  }

  // ── Outpost ──
  ctx.save(); ctx.translate(cx,cy);

  // Base platform shadow
  ctx.beginPath(); ctx.ellipse(6,8,30,14,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fill();

  // Base ring
  ctx.beginPath(); ctx.arc(0,0,26,0,Math.PI*2);
  ctx.fillStyle='#5a4e32'; ctx.fill();
  ctx.strokeStyle='#3a3020'; ctx.lineWidth=2; ctx.stroke();

  // Tower body (octagon)
  ctx.save(); ctx.rotate(outpostAngle);
  const N=8, bodyR=20;
  ctx.beginPath();
  for(let i=0;i<N;i++) {
    const a=(i/N)*Math.PI*2; const x=Math.cos(a)*bodyR, y=Math.sin(a)*bodyR;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='#c8b472'; ctx.fill();
  ctx.strokeStyle='#8a7a4a'; ctx.lineWidth=2; ctx.stroke();

  // Window slits
  for(let i=0;i<8;i++) {
    const a=(i/8)*Math.PI*2+(outpostAngle*.0);
    ctx.save(); ctx.rotate((i/8)*Math.PI*2);
    ctx.fillStyle='rgba(0,100,40,.7)';
    ctx.shadowColor='#00ff88'; ctx.shadowBlur=4;
    ctx.fillRect(bodyR-4,-3,5,6);
    ctx.shadowBlur=0;
    ctx.restore();
  }
  ctx.restore();

  // Antenna
  ctx.strokeStyle='#333'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(14,-2); ctx.lineTo(14,-28); ctx.stroke();
  ctx.beginPath(); ctx.arc(14,-28,4,0,Math.PI*2);
  ctx.fillStyle='#111';
  ctx.shadowColor='#ff4400'; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;

  // Turret base
  ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2);
  ctx.fillStyle='#333'; ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=1.5; ctx.stroke();

  // Turret barrel
  ctx.save(); ctx.rotate(turretAngle);
  // barrel
  ctx.fillStyle='#222';
  ctx.fillRect(-4,-4,30,8);
  // barrel tip detail
  ctx.fillStyle='#111';
  ctx.fillRect(22,-3,6,6);
  // turret body
  ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2);
  ctx.fillStyle='#3a3a3a'; ctx.fill();
  // sight dot
  ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2);
  ctx.fillStyle='#ff4400';
  ctx.shadowColor='#ff4400'; ctx.shadowBlur=6; ctx.fill(); ctx.shadowBlur=0;
  ctx.restore();

  ctx.restore(); // outpost translate

  // Bullets
  ctx.fillStyle='#ffe566';
  for(const b of bullets) {
    ctx.save();
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // Aim line (faint)
  if(touchX!==null && !isReloading) {
    ctx.save();
    ctx.strokeStyle='rgba(255,200,50,.15)'; ctx.lineWidth=1;
    ctx.setLineDash([6,10]);
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(turretAngle)*R*.95, cy+Math.sin(turretAngle)*R*.95);
    ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();
  }

  ctx.restore(); // shake
}

// ── Kill / damage ──
function killEnemy(idx) {
  const e=enemies[idx]; e.dead=true;
  spawnParticles(e.x,e.y,'#882200',12,120,.5);
  spawnParticles(e.x,e.y,'#cc4400',6,80,.35);
  sfx('die'); screenShake=Math.max(screenShake,4);
  enemies.splice(idx,1);
  kills++; enemiesLeft--; updateHUD(); killMsg(e.type);
  if(enemiesLeft<=0&&waveActive) {
    waveActive=false; waveIdx++;
    if(waveIdx>=CFG.WAVES.length) setTimeout(winGame,1400);
    else setTimeout(startWave,2600);
  }
}

// ── Game flow ──
window.startGame = function() {
  document.getElementById('overlay').style.display='none';
  hp=CFG.OUTPOST_HP; kills=0; ammo=CFG.MAX_AMMO;
  waveIdx=0; enemiesLeft=0; waveActive=false;
  bullets=[]; enemies=[]; particles=[];
  isReloading=false; screenShake=0; lastFire=0;
  gameRunning=true; lastTime=performance.now();
  updateHUD(); updateAmmoBar();
  cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
  setTimeout(startWave,800);
};

function gameOver() {
  gameRunning=false;
  showOverlay('OUTPOST LOST','#ff4444',
    `<div class="sgrid">
      <div class="sbox"><div class="sl">WAVE</div><div class="sv">${waveIdx+1}</div></div>
      <div class="sbox"><div class="sl">KILLS</div><div class="sv">${kills}</div></div>
    </div>
    <button class="btn" onclick="startGame()">↺ RETRY</button>`);
}
function winGame() {
  gameRunning=false;
  showOverlay('MISSION COMPLETE','#b8ff50',
    `<div style="color:rgba(255,255,255,.4);font-size:11px;letter-spacing:2px;margin:8px 0">ALL WAVES CLEARED</div>
    <div class="sgrid">
      <div class="sbox"><div class="sl">KILLS</div><div class="sv">${kills}</div></div>
      <div class="sbox"><div class="sl">HP</div><div class="sv">${hp}</div></div>
    </div>
    <button class="btn" onclick="startGame()">▶ PLAY AGAIN</button>`);
}
function showOverlay(title,col,body) {
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1 style="color:${col};text-shadow:0 0 30px ${col}">${title}</h1>${body}`;
  ov.style.display='flex';
}

// ── Init ──
window.addEventListener('load', ()=>{
  resize();
  window.addEventListener('resize', resize);
  setupInput();
  buildAmmoBar();
  // Draw initial background
  draw();
});
</script>
