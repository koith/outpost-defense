<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>OUTPOST: LAST STAND</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace;touch-action:none;user-select:none;}
canvas{display:block;position:fixed;top:0;left:0;}

#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;
  display:flex;justify-content:space-between;align-items:flex-start;padding:8px 10px;gap:5px;}
.hp{background:rgba(0,0,0,.82);border:1px solid rgba(100,200,60,.4);border-radius:6px;
  padding:4px 8px;color:#90ee40;font-size:9px;letter-spacing:1px;flex:1;text-align:center;min-width:0;}
.hp span{font-size:15px;font-weight:bold;color:#b8ff50;display:block;white-space:nowrap;}

#hpbar{position:fixed;bottom:96px;left:0;right:0;height:4px;background:#111;z-index:10;pointer-events:none;}
#hpfill{height:100%;background:linear-gradient(90deg,#ff2020,#ff8800,#90ee40);background-size:300% 100%;transition:width .3s;}

/* 잔탄: 재장전 버튼 바로 위, 세로로 쌓기 */
#ammorow{position:fixed;bottom:184px;left:16px;display:flex;flex-direction:column-reverse;gap:2px;z-index:10;pointer-events:none;align-items:center;}
.atick{width:7px;height:3px;background:#b8ff50;border-radius:2px;}
.atick.spent{background:rgba(180,255,80,.12);}

#skillBar{position:fixed;bottom:102px;left:90px;z-index:10;display:flex;gap:5px;}
.skillSlot{width:32px;height:32px;border-radius:6px;background:rgba(0,0,0,.75);
  border:1px solid rgba(100,200,60,.35);display:flex;align-items:center;justify-content:center;
  font-size:15px;position:relative;cursor:pointer;}
.skillSlot .cd{position:absolute;inset:0;background:rgba(0,0,0,.75);border-radius:5px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;}

/* 하단 메뉴 */
#menu{position:fixed;bottom:0;left:0;right:0;height:92px;
  background:rgba(8,12,6,.97);border-top:1px solid rgba(100,200,60,.25);
  z-index:20;display:flex;align-items:center;padding:0 8px;gap:6px;}
.mTab{flex:1;height:72px;border-radius:6px;background:rgba(0,0,0,.5);
  border:1px solid rgba(100,200,60,.2);display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.mTab.active{border-color:rgba(100,200,60,.7);background:rgba(100,200,60,.08);}
.mTab .ti{font-size:17px;}
.mTab .tl{color:#90ee40;font-size:8px;letter-spacing:1px;margin-top:2px;}

/* 원형 재장전 버튼 — 좌하단 */
#reloadCircle{
  position:fixed; bottom:108px; left:8px;
  width:72px; height:72px; border-radius:50%;
  background:rgba(8,14,6,.95);
  cursor:pointer; z-index:21; -webkit-tap-highlight-color:transparent;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  border: 2px solid rgba(100,200,60,.3);
}
#reloadCircle .rIcon{font-size:22px; line-height:1;}
#reloadCircle .rName{color:#b8ff50;font-size:7px;letter-spacing:1px;margin-top:1px;text-align:center;max-width:60px;overflow:hidden;white-space:nowrap;}
#reloadCircle canvas{position:absolute;top:0;left:0;pointer-events:none;}
/* 웨이브 카운트다운 */
#waveCountdown{
  position:fixed; top:58px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.85); border:1px solid rgba(255,150,0,.5);
  border-radius:10px; padding:8px 22px 10px;
  z-index:15; pointer-events:none; display:none; text-align:center;
  white-space:nowrap; min-width:160px;
}
#waveCountdown .cdLabel{
  color:rgba(255,170,0,.7); font-size:10px; letter-spacing:3px; display:block;
}
#waveCountdown .cdNum{
  color:#ffaa00; font-size:48px; font-weight:bold; line-height:1;
  text-shadow:0 0 20px rgba(255,150,0,.7); display:block; margin-top:2px;
}

/* 패널 */
#panel{position:fixed;bottom:92px;left:0;right:0;background:rgba(6,10,4,.97);
  border-top:1px solid rgba(100,200,60,.25);z-index:19;padding:10px;display:none;max-height:54vh;overflow-y:auto;}
#panel h3{color:#b8ff50;font-size:11px;letter-spacing:3px;margin-bottom:8px;}

/* 서브탭 */
.subTabs{display:flex;gap:4px;margin-bottom:10px;}
.subTab{flex:1;padding:6px;text-align:center;border-radius:4px;border:1px solid rgba(100,200,60,.2);
  color:rgba(144,238,64,.5);font-size:9px;letter-spacing:1px;cursor:pointer;background:transparent;}
.subTab.active{border-color:rgba(100,200,60,.7);color:#b8ff50;background:rgba(100,200,60,.08);}

/* 무기 선택 카드 */
.weaponCard{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.4);
  border:1px solid rgba(100,200,60,.15);border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;}
.weaponCard.selected{border-color:rgba(100,200,60,.7);background:rgba(100,200,60,.06);}
.weaponCard .wicon{font-size:22px;flex-shrink:0;}
.weaponCard .winfo{flex:1;}
.weaponCard .wname{color:#b8ff50;font-size:11px;font-weight:bold;}
.weaponCard .wdesc{color:rgba(255,255,255,.4);font-size:9px;margin-top:1px;}
.weaponCard .wstats{color:rgba(100,200,60,.6);font-size:9px;margin-top:2px;}
.weaponCard .wlevel{color:#ffcc00;font-size:9px;flex-shrink:0;}

.upgradeRow{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.4);
  border:1px solid rgba(100,200,60,.15);border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;}
.upgradeRow:active{background:rgba(100,200,60,.1);}
.upgradeRow.maxed{opacity:.4;pointer-events:none;}
.upgradeRow .icon{font-size:20px;flex-shrink:0;}
.upgradeRow .info{flex:1;}
.upgradeRow .uname{color:#b8ff50;font-size:11px;font-weight:bold;letter-spacing:1px;}
.upgradeRow .udesc{color:rgba(255,255,255,.4);font-size:9px;margin-top:2px;}
.upgradeRow .ulevel{color:rgba(100,200,60,.6);font-size:9px;margin-top:2px;}
.upgradeRow .cost{color:#ffcc00;font-size:11px;font-weight:bold;flex-shrink:0;}

#banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:22px;font-weight:bold;letter-spacing:3px;color:#fff;
  text-shadow:0 0 20px #ff6600;opacity:0;pointer-events:none;z-index:30;
  transition:opacity .3s;text-align:center;}
#killfeed{position:fixed;top:68px;left:10px;z-index:10;pointer-events:none;}
.km{background:rgba(0,0,0,.7);border-left:2px solid #ff4444;color:rgba(255,200,80,.9);
  font-size:9px;letter-spacing:1px;padding:2px 8px;border-radius:0 4px 4px 0;
  margin-bottom:3px;animation:fk 2.5s forwards;}
@keyframes fk{0%{opacity:1}80%{opacity:1}100%{opacity:0}}

#overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;color:#fff;}
#overlay h1{font-size:30px;letter-spacing:6px;color:#b8ff50;text-shadow:0 0 30px #90ee40;margin-bottom:6px;}
.sub{color:rgba(255,255,255,.3);font-size:10px;letter-spacing:3px;margin-bottom:26px;}
.btn{background:transparent;border:1px solid #90ee40;color:#b8ff50;font-family:inherit;
  font-size:13px;letter-spacing:3px;padding:13px 36px;cursor:pointer;margin:5px;border-radius:4px;}
.btn:active{background:rgba(144,238,64,.15);}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;width:230px;}
.sbox{background:rgba(144,238,64,.06);border:1px solid rgba(144,238,64,.2);border-radius:6px;padding:10px;text-align:center;}
.sbox .sl{color:rgba(255,255,255,.3);font-size:9px;letter-spacing:2px;}
.sbox .sv{color:#b8ff50;font-size:20px;font-weight:bold;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hp"><span id="wn">1</span>WAVE</div>
  <div class="hp"><span id="hn">100</span>HP</div>
  <div class="hp"><span id="gn">0</span>💰</div>
  <div class="hp"><span id="kn">0</span>KILLS</div>
</div>
<div id="hpbar"><div id="hpfill" style="width:100%"></div></div>
<div id="ammorow"></div>
<!-- weaponHud removed -->
<div id="skillBar"></div>
<div id="banner"></div>
<div id="killfeed"></div>

<!-- 원형 재장전 버튼 (메뉴 위에 플로팅) -->
<div id="reloadCircle" onclick="manualReload()">
  <canvas id="reloadRingCanvas" width="72" height="72"></canvas>
  <div class="rIcon" id="rcIcon">🔫</div>
  <div class="rName" id="rcName">MACHINE GUN</div>
</div>
<div id="waveCountdown"><span class="cdLabel">NEXT WAVE IN</span><span class="cdNum" id="cdNum">10</span></div>
<div id="menu">
  <div class="mTab active" id="tabFire" onclick="setTab('fire')">
    <div class="ti">🎯</div><div class="tl">BATTLE</div>
  </div>
  <div class="mTab" id="tabUpgrade" onclick="setTab('upgrade')">
    <div class="ti">⚙️</div><div class="tl">UPGRADE</div>
  </div>
  <div class="mTab" id="tabSkill" onclick="setTab('skill')">
    <div class="ti">⚡</div><div class="tl">SKILLS</div>
  </div>
</div>

<div id="panel"></div>

<div id="overlay">
  <h1>OUTPOST</h1>
  <div class="sub">LAST STAND · 최후의 초소</div>
  <div style="color:rgba(255,255,255,.4);font-size:11px;text-align:center;margin-bottom:24px;line-height:2;letter-spacing:1px">
    화면 터치 → 버추얼 조이스틱으로 포탑 조준<br>웨이브를 막고 골드로 무기와 초소를 강화하라
  </div>
  <button class="btn" onclick="startGame()">▶ START MISSION</button>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  OUTPOST: LAST STAND  v6
// ════════════════════════════════════════════════════════════

// ── 무기 정의 ─────────────────────────────────────────────────
const WEAPON_DEFS = {
  machinegun: {
    icon:'🔫', name:'MACHINE GUN', color:'#ffe566',
    baseDmg:14,   baseRate:220,  baseAmmo:20,  baseReload:750,
    baseSpeed:480, upgradeCost:40, costMul:1.6, critChance:0.08, critMul:1.8, unlockCost:0,
    desc:'빠른 연사, 짧은 재장전',
    shoot(cx,cy,angle,state){
      // 단발 총알
      const s=BULLET_START_R;
      return [{x:cx+Math.cos(angle)*s,y:cy+Math.sin(angle)*s,
        vx:Math.cos(angle)*state.speed,vy:Math.sin(angle)*state.speed,
        life:1.4,col:state.color,r:4.5,type:'bullet',dmg:state.dmg}];
    },
    drawBullet(ctx,b){
      ctx.shadowColor=b.col;ctx.shadowBlur=8;
      ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  },
  bomb: {
    icon:'💣', name:'BOMB LAUNCHER', color:'#ff6600',
    baseDmg:40,  baseRate:900,  baseAmmo:6,   baseReload:2400,
    baseSpeed:300, upgradeCost:70, costMul:1.8, critChance:0.12, critMul:2.0, unlockCost:60,
    desc:'폭발 범위 피해, 느린 연사',
    shoot(cx,cy,angle,state){
      const s=BULLET_START_R;
      return [{x:cx+Math.cos(angle)*s,y:cy+Math.sin(angle)*s,
        vx:Math.cos(angle)*state.speed,vy:Math.sin(angle)*state.speed,
        life:1.8,col:state.color,r:7,type:'bomb',dmg:state.dmg,splashR:55}];
    },
    drawBullet(ctx,b){
      ctx.shadowColor='#ff4400';ctx.shadowBlur=12;
      ctx.fillStyle='#333';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(b.x,b.y,b.r*.6,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  },
  laser: {
    icon:'⚡', name:'LASER CANNON', color:'#00ffff',
    baseDmg:8,   baseRate:80,   baseAmmo:30,  baseReload:2000,
    baseSpeed:900, upgradeCost:80, costMul:1.9, critChance:0.05, critMul:1.5, unlockCost:80,
    desc:'관통 피해, 모든 적 통과',
    shoot(cx,cy,angle,state){
      const s=BULLET_START_R;
      return [{x:cx+Math.cos(angle)*s,y:cy+Math.sin(angle)*s,
        vx:Math.cos(angle)*state.speed,vy:Math.sin(angle)*state.speed,
        life:0.8,col:state.color,r:3,type:'laser',dmg:state.dmg,pierce:true}];
    },
    drawBullet(ctx,b){
      ctx.shadowColor=b.col;ctx.shadowBlur=14;
      ctx.strokeStyle=b.col;ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(b.x,b.y);
      ctx.lineTo(b.x-b.vx*.04,b.y-b.vy*.04);ctx.stroke();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  },
  poison: {
    icon:'🏹', name:'POISON ARROW', color:'#88ff44',
    baseDmg:6,   baseRate:350,  baseAmmo:15,  baseReload:1600,
    baseSpeed:420, upgradeCost:60, costMul:1.7, critChance:0.20, critMul:2.5, unlockCost:50,
    desc:'독 지속 피해 (3초)',
    shoot(cx,cy,angle,state){
      const s=BULLET_START_R;
      return [{x:cx+Math.cos(angle)*s,y:cy+Math.sin(angle)*s,
        vx:Math.cos(angle)*state.speed,vy:Math.sin(angle)*state.speed,
        life:1.5,col:state.color,r:4,type:'poison',dmg:state.dmg,poisonDmg:state.dmg*.4,poisonDur:3}];
    },
    drawBullet(ctx,b){
      ctx.save();ctx.translate(b.x,b.y);ctx.rotate(Math.atan2(b.vy,b.vx));
      ctx.shadowColor='#88ff44';ctx.shadowBlur=8;
      ctx.fillStyle='#88ff44';ctx.fillRect(-8,-1.5,12,3);
      ctx.fillStyle='#00cc00';
      ctx.beginPath();ctx.moveTo(4,-3);ctx.lineTo(8,0);ctx.lineTo(4,3);ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;ctx.restore();
    }
  },
  slime: {
    icon:'🫧', name:'SLIME GUN', color:'#aaff00',
    baseDmg:10,  baseRate:500,  baseAmmo:10,  baseReload:2800,
    baseSpeed:260, upgradeCost:65, costMul:1.75, critChance:0.15, critMul:2.2, unlockCost:70,
    desc:'슬로우 효과 (50%, 2초)',
    shoot(cx,cy,angle,state){
      const s=BULLET_START_R;
      return [{x:cx+Math.cos(angle)*s,y:cy+Math.sin(angle)*s,
        vx:Math.cos(angle)*state.speed,vy:Math.sin(angle)*state.speed,
        life:2.0,col:state.color,r:8,type:'slime',dmg:state.dmg,slowDur:2,slowMul:.5}];
    },
    drawBullet(ctx,b){
      const t=b.life/b.startLife||1;
      ctx.shadowColor='#aaff00';ctx.shadowBlur=10;
      ctx.fillStyle='rgba(170,255,0,.7)';
      ctx.beginPath();ctx.arc(b.x,b.y,b.r*(1+Math.sin(Date.now()*.01)*.15),0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(200,255,100,.4)';ctx.beginPath();ctx.arc(b.x-b.r*.25,b.y-b.r*.25,b.r*.35,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }
  },
};

const WEAPON_ORDER=['machinegun','bomb','laser','poison','slime'];

// ── 적 타입 ───────────────────────────────────────────────────
const ENEMY_TYPES={
  basic:   {col:'#5a7838',r:13,label:'ZOMBIE',   goldDrop:3,  pattern:'straight'},
  runner:  {col:'#b85520',r:10,label:'RUNNER',   goldDrop:5,  pattern:'zigzag'},
  brute:   {col:'#443322',r:20,label:'BRUTE',    goldDrop:10, pattern:'straight'},
  sniper:  {col:'#223355',r:11,label:'SNIPER',   goldDrop:8,  pattern:'sniper'},
  bomber:  {col:'#554400',r:14,label:'BOMBER',   goldDrop:7,  pattern:'circle'},
  swarm:   {col:'#2a4a22',r:8, label:'SWARM',    goldDrop:2,  pattern:'swarm'},
  giant:   {col:'#2a1a0a',r:28,label:'GIANT',    goldDrop:25, pattern:'straight'},
  specter: {col:'#334433',r:12,label:'SPECTER',  goldDrop:12, pattern:'teleport'},
  boss:    {col:'#880000',r:35,label:'⚠ BOSS',    goldDrop:80, pattern:'boss'},
};

// ── BIOME 정의 ────────────────────────────────────────────────
const BIOMES = {
  jungle: {
    name:'🌿 JUNGLE', bgBase:'#0d1a08', bgMid:'#1e3010', bgFar:'#162408',
    gridCol:'rgba(60,110,30,.2)', fogCol:'rgba(0,0,0,.55)',
    treeHue:100, treeLum:.13,
    ambientLight:'#334422',
  },
  desert: {
    name:'🏜 DESERT', bgBase:'#1a1208', bgMid:'#2e2010', bgFar:'#1a1208',
    gridCol:'rgba(180,120,40,.15)', fogCol:'rgba(20,10,0,.5)',
    treeHue:35, treeLum:.16,
    ambientLight:'#442200',
  },
  arctic: {
    name:'🧊 ARCTIC', bgBase:'#0a0e18', bgMid:'#101828', bgFar:'#0a0e18',
    gridCol:'rgba(100,160,220,.18)', fogCol:'rgba(0,10,30,.5)',
    treeHue:210, treeLum:.22,
    ambientLight:'#223344',
  },
  volcanic: {
    name:'🌋 VOLCANIC', bgBase:'#120606', bgMid:'#1e0a04', bgFar:'#0e0404',
    gridCol:'rgba(220,60,20,.2)', fogCol:'rgba(30,0,0,.6)',
    treeHue:10, treeLum:.10,
    ambientLight:'#441100',
  },
};

// ── WAVE TABLE (v4) — 환경별 테마 적용 ──────────────────────
// biome: 배경 환경 / hpRestore: 클리어 시 회복 HP
// 초반은 회복 넉넉히, 후반은 적게 (희소성 밸런스)
const WAVES=[
  // ═══ JUNGLE (W1~3) ════════════════════════════════
  // W1: 튜토리얼. 기관총 1탄창 미만 소모.
  {w:1,  biome:'jungle',
   squads:[{count:4, type:'basic', hp:20, speed:38}],
   spawnMs:1000, reward:30, hpRestore:35},

  // W2: 기본 6마리. 1탄창 딱 소모, 장전 1회.
  {w:2,  biome:'jungle',
   squads:[{count:6, type:'basic', hp:24, speed:42}],
   spawnMs:900, reward:40, hpRestore:28},

  // W3: 보스 (HP 140) + 소수 잡몹. 보스는 느리고 탄막 4방향.
  // 총HP 예산: (4×24)+(2×16)+140 = 364 → Lv0~1 기관총 3탄창
  {w:3,  biome:'jungle',
   squads:[{count:4, type:'basic', hp:24, speed:42},{count:2,type:'runner',hp:16,speed:70},{count:1,type:'boss',hp:140,speed:30}],
   spawnMs:900, reward:65, hpRestore:25, hasBoss:true},

  // ═══ DESERT (W4~6) ════════════════════════════════
  // W4: 사막 입장. 러너 중심, 빠르지만 HP 낮음.
  {w:4,  biome:'desert',
   squads:[{count:5, type:'runner', hp:26, speed:72},{count:3,type:'basic',hp:30,speed:46}],
   spawnMs:800, reward:55, hpRestore:22},

  // W5: 브루트 2마리 + 스웜. 브루트가 어그로 끌면서 스웜이 파고듦.
  {w:5,  biome:'desert',
   squads:[{count:2, type:'brute', hp:65, speed:36},{count:6,type:'swarm',hp:14,speed:72}],
   spawnMs:800, reward:72, hpRestore:18},

  // W6: 보스 (HP 280) + 스나이퍼. 업그레이드 2회 가정 DPS~100.
  // 총HP: (2×42)+(3×30)+280 = 454 → 3~4탄창
  {w:6,  biome:'desert',
   squads:[{count:2, type:'sniper', hp:42, speed:28},{count:3,type:'runner',hp:30,speed:78},{count:1,type:'boss',hp:280,speed:26}],
   spawnMs:750, reward:110, hpRestore:15, hasBoss:true},

  // ═══ ARCTIC (W7~8) ════════════════════════════════

function buildTrees(){

  for(let i=0;i<30;i++){
    const a=(i/30)*Math.PI*2+Math.random()*.35,r=R+20+Math.random()*45;

      hue:bm.treeHue+Math.random()*20,lum:bm.treeLum+Math.random()*.08});

function buildAmmoBar(){
  const w=getCurWeapon(),el=document.getElementById('ammorow');el.innerHTML='';
  const max=Math.min(w.maxAmmo,30);
  for(let i=0;i<max;i++){const d=document.createElement('div');d.className='atick';d.id='a'+i;el.appendChild(d);}
}
function updateAmmoBar(){
  const w=getCurWeapon();
  for(let i=0;i<w.maxAmmo&&i<30;i++){const e=document.getElementById('a'+i);if(e)e.className='atick'+(i<w.ammo?'':' spent');}
}
function buildSkillBar(){
  const el=document.getElementById('skillBar');el.innerHTML='';
  SKILLS.forEach((sk,i)=>{
    if(!sk.unlocked)return;
    const d=document.createElement('div');d.className='skillSlot';d.innerHTML=sk.icon;d.id='sk'+sk.id;
    d.onclick=()=>activateSkill(i);el.appendChild(d);
  });
}
function updateSkillBar(dt){
  SKILLS.forEach(sk=>{
    if(!sk.unlocked)return;
    const el=document.getElementById('sk'+sk.id);if(!el)return;
    if(sk.cdLeft>0){sk.cdLeft=Math.max(0,sk.cdLeft-dt);el.innerHTML=sk.icon+`<div class="cd">${Math.ceil(sk.cdLeft)}</div>`;}
    else el.innerHTML=sk.icon;
  });
}
function activateSkill(idx){
  const sk=SKILLS[idx];if(!sk||!sk.unlocked||sk.cdLeft>0)return;
  sk.cdLeft=sk.cooldown;sk.activate();buildSkillBar();
}
function updateWeaponHud(){
  const d=getCurDef(),w=getCurWeapon();
  // 원형 버튼 아이콘/이름
  document.getElementById('rcIcon').textContent=d.icon;
  document.getElementById('rcName').textContent=d.name;
  // 원형 링 게이지
  const rc=document.getElementById('reloadCircle');
  const ringCanvas=document.getElementById('reloadRingCanvas');
  const rctx=ringCanvas.getContext('2d');
  const sz=72,cx2=sz/2,cy2=sz/2,rad=33,lw=4;
  rctx.clearRect(0,0,sz,sz);
  // 기본 링
  rctx.beginPath();rctx.arc(cx2,cy2,rad,0,Math.PI*2);
  rctx.strokeStyle='rgba(100,200,60,.2)';rctx.lineWidth=lw;rctx.stroke();
  if(w.isReloading){
    const pct=1-(w.reloadTimer/w.reload);
    rctx.beginPath();rctx.arc(cx2,cy2,rad,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);
    rctx.strokeStyle='#ffaa00';rctx.lineWidth=lw;rctx.lineCap='round';rctx.stroke();
    rc.style.opacity='0.7';
  } else if(frenzyActive){
    rctx.beginPath();rctx.arc(cx2,cy2,rad,0,Math.PI*2);
    rctx.strokeStyle='#ff6600';rctx.lineWidth=lw;rctx.stroke();
    rc.style.opacity='0.5';
  } else {
    rctx.beginPath();rctx.arc(cx2,cy2,rad,0,Math.PI*2);
    rctx.strokeStyle='rgba(144,238,64,.6)';rctx.lineWidth=lw;rctx.stroke();
    rc.style.opacity='1';
  }
}

function renderWeaponTab(){

function renderOutpostTab(){

    const lv=upgradeLevel[u.id]||0,maxed=lv>=u.max;

function selectWeapon(id){
  currentWeaponId=id;buildAmmoBar();updateAmmoBar();updateWeaponHud();renderUpgradePanel();
  showBanner(WEAPON_DEFS[id].name+' 장착','#b8ff50');
}
function buyWeaponUpgrade(id){
  const d=WEAPON_DEFS[id],w=weaponState[id];
  const lv=upgradeLevel['w_'+id]||0;if(lv>=5)return;
  const cost=Math.round(d.upgradeCost*Math.pow(d.costMul,lv));
  if(gold<cost){showBanner('골드 부족!','#ff4444');return;}
  gold-=cost;upgradeLevel['w_'+id]=lv+1;
  // 각 스탯 강화
  w.dmg=Math.round(d.baseDmg*(1+lv*.25+.25));
  w.rate=Math.max(50,Math.round(d.baseRate*(1-(lv*.08+.08))));
  w.maxAmmo=Math.round(d.baseAmmo*(1+lv*.15+.15));
  w.ammo=Math.min(w.ammo+2,w.maxAmmo);
  w.reload=Math.max(300,Math.round(d.baseReload*(1-(lv*.12+.12))));
  w.speed=Math.round(d.baseSpeed*(1+lv*.08+.08));
  updateHUD();buildAmmoBar();updateAmmoBar();updateWeaponHud();renderUpgradePanel();
  showBanner(d.name+' 업그레이드!','#b8ff50');
}
function buyOutpostUpgrade(id){
  const u=OUTPOST_UPGRADES.find(x=>x.id===id);if(!u)return;
  const lv=upgradeLevel[id]||0;if(lv>=u.max)return;
  const cost=Math.round(u.baseCost*Math.pow(u.costMul,lv));
  if(gold<cost){showBanner('골드 부족!','#ff4444');return;}
  gold-=cost;upgradeLevel[id]=lv+1;u.apply();updateHUD();renderUpgradePanel();
  showBanner(u.name+' 강화!','#b8ff50');
}
function buySkill(idx){
  const sk=SKILLS[idx];if(!sk||sk.unlocked)return;
  if(gold<sk.cost){showBanner('골드 부족!','#ff4444');return;}
  gold-=sk.cost;sk.unlocked=true;updateHUD();buildSkillBar();renderSkillPanel();
  showBanner(sk.name+' 습득!','#4488ff');
}
// 무기 카드 클릭 핸들러
window.doWeaponCardClick=function(id){
  const w=weaponState[id];
  if(!w)return;
  if(!w.unlocked){
    // 해금
    const d=WEAPON_DEFS[id];
    if(gold<d.unlockCost){showBanner('골드 부족!','#ff4444');return;}
    gold-=d.unlockCost; w.unlocked=true; updateHUD();
    currentWeaponId=id; buildAmmoBar(); updateAmmoBar(); updateWeaponHud();
    renderUpgradePanel();
    showBanner(d.name+' 해금! 장착됨','#ffaa00');
    return;
  }
  if(id===currentWeaponId){
    // 업그레이드
    buyWeaponUpgrade(id);
  } else {
    // 장착
    currentWeaponId=id; buildAmmoBar(); updateAmmoBar(); updateWeaponHud();
    renderUpgradePanel();
    showBanner(WEAPON_DEFS[id].name+' 장착','#b8ff50');
  }
};

// ── AUDIO ────────────────────────────────────────────────────
let audioCtx;
function sfx(type){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime;
    if(type==='shoot'){o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(70,t+.08);g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.10);o.start(t);o.stop(t+.12);}
    else if(type==='laser'){o.type='sine';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(300,t+.08);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.09);o.start(t);o.stop(t+.10);}
    else if(type==='bomb'){o.type='sawtooth';o.frequency.setValueAtTime(90,t);o.frequency.exponentialRampToValueAtTime(22,t+.4);g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.45);o.start(t);o.stop(t+.5);}
    else if(type==='poison'){o.type='square';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(180,t+.1);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.14);}
    else if(type==='slime'){o.type='sine';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(80,t+.15);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);o.start(t);o.stop(t+.20);}
    else if(type==='hit'){o.type='square';o.frequency.setValueAtTime(130,t);g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.14);}
    else if(type==='die'){o.type='sawtooth';o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(32,t+.35);g.gain.setValueAtTime(.26,t);g.gain.exponentialRampToValueAtTime(.001,t+.38);o.start(t);o.stop(t+.40);}
    else if(type==='reload'){
      // 철컥1
      const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
      o2.connect(g2);g2.connect(audioCtx.destination);
      o2.type='square';o2.frequency.setValueAtTime(180,t);o2.frequency.exponentialRampToValueAtTime(60,t+.06);
      g2.gain.setValueAtTime(.3,t);g2.gain.exponentialRampToValueAtTime(.001,t+.08);
      o2.start(t);o2.stop(t+.09);
      // 철컥2 (딜레이)
      o.type='square';o.frequency.setValueAtTime(220,t+.18);o.frequency.exponentialRampToValueAtTime(70,t+.24);
      g.gain.setValueAtTime(0,t);g.gain.setValueAtTime(.28,t+.18);g.gain.exponentialRampToValueAtTime(.001,t+.26);
      o.start(t+.18);o.stop(t+.28);
    }
    else if(type==='boom'){o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(18,t+.5);g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.55);o.start(t);o.stop(t+.6);}
    else if(type==='snipe'){o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(60,t+.2);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);o.start(t);o.stop(t+.24);}
  }catch(e){}
}

// ── INPUT — 버추얼 조이스틱 ─────────────────────────────────
function setupInput(){
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(currentTab!=='fire'){setTab('fire');return;}
    const t=e.changedTouches[0];
    joy.active=true;joy.baseX=t.clientX;joy.baseY=t.clientY;
    joy.curX=t.clientX;joy.curY=t.clientY;joy.id=t.identifier;
  },{passive:false});
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!joy.active)return;
    for(const t of e.changedTouches){
      if(t.identifier===joy.id){joy.curX=t.clientX;joy.curY=t.clientY;}
    }
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){if(t.identifier===joy.id)joy.active=false;}
  },{passive:false});
  canvas.addEventListener('mousedown',e=>{
    if(currentTab!=='fire'){setTab('fire');return;}
    joy.active=true;joy.baseX=e.clientX;joy.baseY=e.clientY;
    joy.curX=e.clientX;joy.curY=e.clientY;
  });
  canvas.addEventListener('mousemove',e=>{if(joy.active){joy.curX=e.clientX;joy.curY=e.clientY;}});
  canvas.addEventListener('mouseup',()=>{joy.active=false;});
}

// ── 수동 재장전 ──────────────────────────────────────────────
window.manualReload=function(){
  const w=getCurWeapon();
  if(w.isReloading||w.ammo===w.maxAmmo||frenzyActive)return;
  startReload();
};

// ── PARTICLES ────────────────────────────────────────────────
function spawnParticles(x,y,col,n,spd,life){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=spd*(.4+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,col,r:2+Math.random()*3});}
}
function spawnRing(x,y,col,maxR=30){particles.push({x,y,ring:true,r:4,maxR,life:.35,maxLife:.35,col});}
function spawnMuzzle(x,y,angle,col){
  for(let i=0;i<4;i++){const a=angle+(Math.random()-.5)*.5,s=150+Math.random()*90;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.11,maxLife:.11,col:col||'#ffe566',r:3+Math.random()*3});}
}

// ── FIRE ─────────────────────────────────────────────────────
function fireBullet(){
  const w=getCurWeapon(),d=getCurDef();
  if(!frenzyActive&&(w.ammo<=0||w.isReloading))return;
  const now=performance.now(),rate=frenzyActive?w.rate*.35:w.rate;
  if(now-lastFire<rate)return;
  lastFire=now;
  if(!frenzyActive){w.ammo--;updateAmmoBar();}
  // 무기별 발사음
  sfx(currentWeaponId==='machinegun'?'shoot':currentWeaponId==='laser'?'laser':currentWeaponId==='bomb'?'bomb':currentWeaponId==='poison'?'poison':'slime');
  const isCrit=Math.random()<(d.critChance||0.08);
  const critMul=d.critMul||1.8;
  const newBullets=d.shoot(cx,cy,turretAngle,w);
  newBullets.forEach(b=>{
    b.startLife=b.life;
    if(isCrit){b.dmg=Math.round(b.dmg*critMul);b.isCrit=true;b.r=(b.r||4)+2;}
    bullets.push(b);
  });
  spawnMuzzle(cx+Math.cos(turretAngle)*BULLET_START_R,cy+Math.sin(turretAngle)*BULLET_START_R,turretAngle,w.color);
  screenShake=Math.max(screenShake,currentWeaponId==='bomb'?4:2.5);
  if(!frenzyActive&&w.ammo===0)startReload();
  updateWeaponHud();
}
function startReload(){
  const w=getCurWeapon();
  if(w.isReloading)return;
  w.isReloading=true;w.reloadTimer=w.reload;
  sfx('reload');showBanner('RELOADING...','#ffaa00');
  updateWeaponHud();
}

// ── ENEMY SPAWN ───────────────────────────────────────────────
function spawnEnemy(squad){
  const def=ENEMY_TYPES[squad.type]||ENEMY_TYPES.basic;
  const a=Math.random()*Math.PI*2;
  enemies.push({
    x:cx+Math.cos(a)*(R+14),y:cy+Math.sin(a)*(R+14),
    hp:squad.hp,maxHp:squad.hp,speed:squad.speed||def.speed,
    type:squad.type,col:def.col,r:def.r,
    angle:0,bobT:Math.random()*Math.PI*2,hitFlash:0,dead:false,attackTimer:0,
    poisoned:false,poisonTimer:0,poisonDmg:0,
    slowed:false,slowTimer:0,slowMul:1,
    pattern:def.pattern,
    zigDir:Math.random()>.5?1:-1,zigTimer:0,
    orbitDir:Math.random()>.5?1:-1,orbitAngle:a+Math.PI,
    teleTimer:3+Math.random()*2,sniperTimer:2+Math.random()*2,
    swarmAngle:Math.random()*Math.PI*2,
  });
}
function buildWaveSquads(w){const all=[];for(const sq of w.squads)for(let i=0;i<sq.count;i++)all.push(sq);return all;}

let biomeTransitioning=false;
function startWave(){
  if(waveIdx>=WAVES.length){winGame();return;}
  const newBiome=WAVES[waveIdx].biome||'jungle';
  const isBossWave=WAVES[waveIdx].hasBoss;
  if(newBiome!==currentBiome){
    // 씬 전환 연출
    biomeTransitioning=true;
    const bm=BIOMES[newBiome];
    const tr=document.createElement('div');
    tr.id='biomeTransition';
    tr.style.cssText=`position:fixed;inset:0;background:#000;z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:'Courier New',monospace;opacity:0;transition:opacity .4s`;
    tr.innerHTML=`<div style="font-size:32px;margin-bottom:12px">${bm.name.split(' ')[0]}</div>
      <div style="font-size:20px;letter-spacing:4px;color:#b8ff50">${bm.name.replace(/^\S+\s/,'')}</div>
      <div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-top:10px">ENTERING NEW REGION</div>`;
    document.body.appendChild(tr);
    setTimeout(()=>tr.style.opacity='1',10);
    setTimeout(()=>{
      currentBiome=newBiome;buildTrees();
      tr.style.opacity='0';
      setTimeout(()=>{document.body.removeChild(tr);biomeTransitioning=false;actuallyStartWave(isBossWave);},400);
    },1800);
    return;
  }
  currentBiome=newBiome;
  actuallyStartWave(isBossWave);
}
function actuallyStartWave(isBossWave){

  const w=WAVES[waveIdx];
  const squads=buildWaveSquads(w);
  enemiesLeft=squads.length;waveActive=true;
  if(isBossWave){
    showBanner('⚠ BOSS WAVE '+w.w,'#ff2200');
  } else {
    showBanner('WAVE '+w.w+(w.w===10?' ⚠ FINAL':''),'#ff9900');
  }
  let spawned=0;
  const iv=setInterval(()=>{
    if(!gameRunning){clearInterval(iv);return;}
    if(spawned>=squads.length){clearInterval(iv);return;}
    spawnEnemy(squads[spawned]);spawned++;
  },w.spawnMs);
}
let countdownTimer=null;
function onWaveClear(){
  waveActive=false;const w=WAVES[waveIdx];
  const reward=w.reward; gold+=reward;
  const restore=w.hpRestore||0;
  if(restore>0){hp=Math.min(CFG.OUTPOST_HP,hp+restore);}
  updateHUD();
  showBanner('WAVE CLEAR! +💰'+reward+(restore>0?' +❤️'+restore:''),'#b8ff50');
  waveIdx++;
  if(waveIdx>=WAVES.length){setTimeout(winGame,1600);return;}
  // 10초 카운트다운
  let remaining=10;
  const cdEl=document.getElementById('waveCountdown');
  const cdNum=document.getElementById('cdNum');
  cdEl.style.display='block';
  cdNum.textContent=remaining;
  clearInterval(countdownTimer);
  countdownTimer=setInterval(()=>{
    remaining--;
    if(remaining<=0){
      clearInterval(countdownTimer);
      cdEl.style.display='none';
      startWave();
    } else {
      cdNum.textContent=remaining;
    }
  },1000);
}

// ── MAIN LOOP ────────────────────────────────────────────────
function loop(ts){
  raf=requestAnimationFrame(loop);if(!gameRunning||isPaused)return;
  const dt=Math.min((ts-lastTime)/1000,.05);lastTime=ts;

  // 자동 회복
  if(CFG.regenPerSec>0&&hp<CFG.OUTPOST_HP){hp=Math.min(CFG.OUTPOST_HP,hp+CFG.regenPerSec*dt);updateHUD();}
  // 무기 재장전
  const w=getCurWeapon();
  if(w.isReloading){
    w.reloadTimer-=dt*1000;
    if(w.reloadTimer<=0){w.isReloading=false;w.ammo=w.maxAmmo;updateAmmoBar();}
    updateWeaponHud();
  }
  if(frenzyActive){frenzyTimer-=dt;if(frenzyTimer<=0)frenzyActive=false;}
  if(shieldActive){shieldTimer-=dt;if(shieldTimer<=0)shieldActive=false;}
  updateSkillBar(dt);

  // 조이스틱 → 포탑 각도
  if(joy.active&&currentTab==='fire'){
    const dx=joy.curX-joy.baseX,dy=joy.curY-joy.baseY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>8){// 데드존
      targetAngle=Math.atan2(dy,dx);
      fireBullet();
    }
  }
  let diff=targetAngle-turretAngle;
  while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
  turretAngle+=diff*Math.min(dt*16,1);
  outpostRot+=dt*.03;

  // 플레이어 총알
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.life-=dt;b.x+=b.vx*dt;b.y+=b.vy*dt;
    const od=Math.sqrt((b.x-cx)**2+(b.y-cy)**2);
    if(od>R+70||b.life<=0){bullets.splice(i,1);continue;}
    let hitAny=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];if(e.dead)continue;
      const ex=b.x-e.x,ey=b.y-e.y;
      if(ex*ex+ey*ey<(e.r+6)*(e.r+6)){
        sfx('hit');e.hitFlash=b.isCrit?.25:.13;
        // 크리티컬 파티클
        if(b.isCrit){spawnParticles(b.x,b.y,'#ff4400',8,130,.4);spawnRing(b.x,b.y,'rgba(255,80,0,.9)',45);screenShake=Math.max(screenShake,4);}
        // 무기별 효과
        if(b.type==='bomb'){
          // 범위 폭발
          sfx('boom');spawnRing(b.x,b.y,'#ff6600',b.splashR);spawnParticles(b.x,b.y,'#ff4400',14,160,.6);screenShake=8;
          for(let k=enemies.length-1;k>=0;k--){
            const t2=enemies[k];if(t2.dead)continue;
            const bx=b.x-t2.x,by=b.y-t2.y;
            if(bx*bx+by*by<b.splashR*b.splashR){t2.hp-=b.dmg;t2.hitFlash=.2;if(t2.hp<=0)killEnemy(k);}
          }
          bullets.splice(i,1);hitAny=true;break;
        }
        if(b.type==='poison'){e.poisoned=true;e.poisonTimer=b.poisonDur;e.poisonDmg=b.poisonDmg;spawnParticles(b.x,b.y,'#88ff44',5,60,.3);}
        if(b.type==='slime'){e.slowed=true;e.slowTimer=b.slowDur;e.slowMul=b.slowMul;spawnRing(b.x,b.y,'rgba(170,255,0,.6)',40);}
        e.hp-=b.dmg;
        spawnDmgText(e.x,e.y-e.r,b.dmg,b.isCrit);
        if(!b.isCrit)spawnRing(b.x,b.y,'rgba(255,160,0,.7)');
        screenShake=Math.max(screenShake,b.isCrit?3.5:1.8);
        if(e.hp<=0)killEnemy(j);
        if(!b.pierce){bullets.splice(i,1);hitAny=true;break;}
        else hitAny=true; // 레이저: 계속 진행
      }
    }
  }

  // 적 총알
  for(let i=enemyBullets.length-1;i>=0;i--){
    const b=enemyBullets[i];b.life-=dt;b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.life<=0){enemyBullets.splice(i,1);continue;}
    const d=Math.sqrt((b.x-cx)**2+(b.y-cy)**2);
    if(d<30){
      enemyBullets.splice(i,1);
      if(!shieldActive){hp=Math.max(0,hp-b.dmg);updateHUD();screenShake=4;spawnParticles(cx,cy,'#ff4400',6,80,.3);if(hp<=0){gameOver();return;}}
    }
  }

  // 적 업데이트
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];if(e.dead)continue;
    const dx=cx-e.x,dy=cy-e.y,dist=Math.sqrt(dx*dx+dy*dy);
    e.angle=Math.atan2(dy,dx);e.bobT+=dt*6;if(e.hitFlash>0)e.hitFlash-=dt;
    // 독 피해
    if(e.poisoned){e.poisonTimer-=dt;e.hp-=e.poisonDmg*dt;if(e.hp<=0){killEnemy(i);continue;}if(e.poisonTimer<=0)e.poisoned=false;}
    // 슬로우
    if(e.slowed){e.slowTimer-=dt;if(e.slowTimer<=0){e.slowed=false;e.slowMul=1;}}
    const spd=e.speed*(e.slowed?e.slowMul:1);
    const minDist=OUTPOST_BLOCK_R+e.r;
    const moveToOutpost=()=>{
      if(dist>minDist){e.x+=Math.cos(e.angle)*spd*dt;e.y+=Math.sin(e.angle)*spd*dt;}
      else{
        e.attackTimer+=dt;
        if(e.attackTimer>=1.0){e.attackTimer=0;
          if(!shieldActive){const dmg=(e.type==='giant'?15:e.type==='brute'?10:e.type==='runner'?3:5)*CFG.meleeDmgMul;
            hp=Math.max(0,hp-dmg);updateHUD();screenShake=6;if(hp<=0){gameOver();return false;}}
        }
        const push=minDist-dist+1;e.x-=Math.cos(e.angle)*push;e.y-=Math.sin(e.angle)*push;
      }
      return true;
    };
    if(e.pattern==='straight'){if(!moveToOutpost())return;}
    else if(e.pattern==='zigzag'){
      e.zigTimer+=dt;if(e.zigTimer>.55){e.zigDir*=-1;e.zigTimer=0;}
      const perp=e.angle+Math.PI/2;
      if(dist>minDist){e.x+=(Math.cos(e.angle)*spd+Math.cos(perp)*spd*.5*e.zigDir)*dt;e.y+=(Math.sin(e.angle)*spd+Math.sin(perp)*spd*.5*e.zigDir)*dt;}
      else{e.attackTimer+=dt;if(e.attackTimer>=.8){e.attackTimer=0;if(!shieldActive){hp=Math.max(0,hp-3*CFG.meleeDmgMul);updateHUD();if(hp<=0){gameOver();return;}}}
        const push=minDist-dist+1;e.x-=Math.cos(e.angle)*push;e.y-=Math.sin(e.angle)*push;}
    }
    else if(e.pattern==='circle'){
      const orbitR=R*.55;
      if(dist>orbitR+20){e.x+=Math.cos(e.angle)*spd*dt;e.y+=Math.sin(e.angle)*spd*dt;}
      else{e.orbitAngle+=e.orbitDir*dt*1.1;const tr=Math.max(minDist,dist-dt*16);e.x=cx+Math.cos(e.orbitAngle)*tr;e.y=cy+Math.sin(e.orbitAngle)*tr;
        if(dist<=minDist+4){e.attackTimer+=dt;if(e.attackTimer>=1.2){e.attackTimer=0;if(!shieldActive){hp=Math.max(0,hp-7*CFG.meleeDmgMul);updateHUD();screenShake=4;if(hp<=0){gameOver();return;}}}}}
    }
    else if(e.pattern==='sniper'){
      const keepDist=R*.68;
      if(dist>keepDist+15)e.x+=Math.cos(e.angle)*spd*dt,e.y+=Math.sin(e.angle)*spd*dt;
      else if(dist<keepDist-15)e.x-=Math.cos(e.angle)*spd*.5*dt,e.y-=Math.sin(e.angle)*spd*.5*dt;
      e.sniperTimer-=dt;
      if(e.sniperTimer<=0){e.sniperTimer=4+Math.random()*2;sfx('snipe');
        const sa=Math.atan2(cy-e.y,cx-e.x);
        enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(sa)*180,vy:Math.sin(sa)*180,life:3,dmg:8,col:'#4488ff'});
        spawnParticles(e.x,e.y,'#4488ff',4,60,.25);}
    }
    else if(e.pattern==='swarm'){
      e.swarmAngle+=dt*(1.8+Math.sin(e.bobT*.5)*.4);
      if(dist>R*.5){const mx=e.angle*.7+e.swarmAngle*.3;e.x+=Math.cos(mx)*spd*dt;e.y+=Math.sin(mx)*spd*dt;}
      else if(dist>minDist){e.x+=Math.cos(e.angle)*spd*1.4*dt;e.y+=Math.sin(e.angle)*spd*1.4*dt;}
      else{e.attackTimer+=dt;if(e.attackTimer>=.7){e.attackTimer=0;if(!shieldActive){hp=Math.max(0,hp-2*CFG.meleeDmgMul);updateHUD();if(hp<=0){gameOver();return;}}}
        const push=minDist-dist+1;e.x-=Math.cos(e.angle)*push;e.y-=Math.sin(e.angle)*push;}
    }
    else if(e.pattern==='boss'){
      // 보스: 나선형 접근 + 3초마다 광역 돌진 + 주기적 탄막
      const bossMinDist=OUTPOST_BLOCK_R+e.r;
      e.bossTimer=(e.bossTimer||0)+dt;
      e.bossPhase=e.bossPhase||'approach';
      e.bossChargeTimer=(e.bossChargeTimer||6)-dt;
      // 탄막 타이머
      e.bossBulletTimer=(e.bossBulletTimer||4)-dt;
      if(e.bossBulletTimer<=0){
        e.bossBulletTimer=4;
        // 4방향 탄막 (초반 보스는 덜 위협적)
        const dirs=e.hp<e.maxHp*.5?8:4; // HP 절반 이하면 8방향으로 강화
        for(let bi=0;bi<dirs;bi++){
          const ba=(bi/dirs)*Math.PI*2;
          enemyBullets.push({x:e.x,y:e.y,vx:Math.cos(ba)*160,vy:Math.sin(ba)*160,life:2.5,dmg:8,col:'#ff2200'});
        }
        spawnParticles(e.x,e.y,'#ff4400',12,100,.5);
        sfx('boom');
      }
      if(e.bossChargeTimer<=0){
        // 돌진
        e.bossChargeTimer=7+Math.random()*3;
        e.bossPhase='charge';
        e.chargeAngle=e.angle;
        e.chargeTimer=.4;
        showBanner('⚠ BOSS CHARGE!','#ff2200');
        screenShake=6;
      }
      if(e.bossPhase==='charge'){
        e.chargeTimer-=dt;
        e.x+=Math.cos(e.chargeAngle)*e.speed*4*dt;
        e.y+=Math.sin(e.chargeAngle)*e.speed*4*dt;
        if(e.chargeTimer<=0)e.bossPhase='approach';
      } else {
        // 나선형 접근
        e.bossTimer+=dt*.5;
        const spiral=Math.sin(e.bossTimer)*40;
        const toC=e.angle;
        const perpA=toC+Math.PI/2;
        if(dist>bossMinDist){
          e.x+=(Math.cos(toC)*e.speed+Math.cos(perpA)*spiral*.04)*dt;
          e.y+=(Math.sin(toC)*e.speed+Math.sin(perpA)*spiral*.04)*dt;
        }
      }
      if(dist<=bossMinDist+5){
        e.attackTimer+=dt;
        if(e.attackTimer>=1.0){
          e.attackTimer=0;
          if(!shieldActive){hp=Math.max(0,hp-10*CFG.meleeDmgMul);updateHUD();screenShake=6;if(hp<=0){gameOver();return false;}}
        }
        const push=bossMinDist-dist+1;e.x-=Math.cos(e.angle)*push;e.y-=Math.sin(e.angle)*push;
      }
    }
    else if(e.pattern==='teleport'){
      e.teleTimer-=dt;
      if(e.teleTimer<=0){e.teleTimer=3+Math.random()*2;const na=Math.random()*Math.PI*2,nr=R*.3+Math.random()*R*.45;
        e.x=cx+Math.cos(na)*nr;e.y=cy+Math.sin(na)*nr;spawnParticles(e.x,e.y,'#88ff88',8,80,.4);}
      if(!moveToOutpost())return;
    }
    // 아레나 경계
    const ed=Math.sqrt((e.x-cx)**2+(e.y-cy)**2);
    if(ed>R+32){const ea=Math.atan2(e.y-cy,e.x-cx);e.x=cx+Math.cos(ea)*(R+32);e.y=cy+Math.sin(ea)*(R+32);}
  }

  // 파티클
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    if(!p.ring){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=160*dt;}
    else p.r+=(p.maxR-4)*(dt/p.maxLife)*3;
  }
  for(let i=floatingTexts.length-1;i>=0;i--){
    const ft=floatingTexts[i];ft.life-=dt;ft.y+=ft.vy*dt;if(ft.life<=0)floatingTexts.splice(i,1);
  }
  screenShake=Math.max(0,screenShake-dt*16);
  draw();
}

// ── DRAW ─────────────────────────────────────────────────────
function poly(n,r,rot=0){
  ctx.beginPath();for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2+rot;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();
}

function draw(){
  const sx=screenShake>0?(Math.random()-.5)*screenShake*2:0,sy=screenShake>0?(Math.random()-.5)*screenShake*2:0;
  ctx.save();ctx.translate(sx,sy);

  // BG — biome 기반
  const bm=BIOMES[currentBiome]||BIOMES.jungle;
  ctx.fillStyle=bm.bgBase;ctx.fillRect(-20,-20,W+40,H+40);
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,R+55);
  grd.addColorStop(0,bm.bgMid);grd.addColorStop(.7,bm.bgFar);grd.addColorStop(1,bm.bgBase);
  ctx.beginPath();ctx.arc(cx,cy,R+55,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  // biome 특수 오버레이
  if(currentBiome==='volcanic'){
    // 용암 균열 느낌
    ctx.strokeStyle='rgba(255,60,0,.08)';ctx.lineWidth=2;
    for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*(R+50),cy+Math.sin(a)*(R+50));ctx.stroke();}
  }
  if(currentBiome==='arctic'){
    // 눈보라 느낌 점들
    if(Math.random()<.3){particles.push({x:Math.random()*W,y:0,vx:(Math.random()-.5)*20,vy:30+Math.random()*20,life:.8,maxLife:.8,col:'rgba(200,220,255,.5)',r:1.5});}
  }
  // Grid
  ctx.strokeStyle=bm.gridCol;ctx.lineWidth=1;
  for(let r=R*.3;r<=R+1;r+=R*.3){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();}
  for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*(R+1),cy+Math.sin(a)*(R+1));ctx.stroke();}

  // Trees
  for(const t of trees){
    ctx.beginPath();ctx.ellipse(t.x+4,t.y+6,t.r*.65,t.r*.32,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.3)';ctx.fill();
    ctx.beginPath();ctx.arc(t.x,t.y,t.r*.3,0,Math.PI*2);ctx.fillStyle='hsl(25,35%,16%)';ctx.fill();
    ctx.beginPath();ctx.arc(t.x,t.y-t.r*.25,t.r,0,Math.PI*2);ctx.fillStyle=`hsl(${t.hue},52%,${Math.floor(t.lum*100)}%)`;ctx.fill();
    ctx.beginPath();ctx.arc(t.x-t.r*.28,t.y-t.r*.12,t.r*.68,0,Math.PI*2);ctx.fillStyle=`hsl(${t.hue+8},56%,${Math.floor((t.lum+.04)*100)}%)`;ctx.fill();
  }
  const bm2=BIOMES[currentBiome]||BIOMES.jungle;
  const ev=ctx.createRadialGradient(cx,cy,R-10,cx,cy,R+30);ev.addColorStop(0,'rgba(0,0,0,0)');ev.addColorStop(1,bm2.fogCol);
  ctx.beginPath();ctx.arc(cx,cy,R+30,0,Math.PI*2);ctx.fillStyle=ev;ctx.fill();

  // 적
  for(const e of enemies){
    if(e.dead)continue;
    const bobY=Math.sin(e.bobT)*2;
    ctx.save();ctx.translate(e.x,e.y+bobY);ctx.rotate(e.angle+Math.PI/2);
    ctx.beginPath();ctx.ellipse(0,e.r*.55,e.r*.65,e.r*.28,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.38)';ctx.fill();
    const bw=e.r*2.4;ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(-bw/2,-e.r-11,bw,5);
    ctx.fillStyle=e.hp/e.maxHp>.5?'#55cc15':'#ff4400';ctx.fillRect(-bw/2,-e.r-11,bw*(e.hp/e.maxHp),5);
    const fl=e.hitFlash>0;
    const ec=e.poisoned?'#44aa22':e.slowed?'#88aaff':e.col;
    if(e.type==='giant'){ctx.fillStyle=fl?'#ff9966':ec;poly(6,e.r*.9);ctx.fill();ctx.strokeStyle='#4a2a10';ctx.lineWidth=2;ctx.stroke();}
    else if(e.type==='brute'){ctx.fillStyle=fl?'#ff8866':ec;ctx.fillRect(-e.r*.72,-e.r*.85,e.r*1.44,e.r*1.6);ctx.strokeStyle='#2a1a0a';ctx.lineWidth=1.5;ctx.strokeRect(-e.r*.72,-e.r*.85,e.r*1.44,e.r*1.6);}
    else if(e.type==='sniper'){ctx.fillStyle=fl?'#88aaff':ec;ctx.beginPath();ctx.ellipse(0,0,e.r*.6,e.r*.85,0,0,Math.PI*2);ctx.fill();}
    else if(e.type==='specter'){ctx.globalAlpha=.72;ctx.fillStyle=fl?'#aaffaa':ec;poly(6,e.r*.9,Math.PI/6);ctx.fill();ctx.globalAlpha=1;}
    else if(e.type==='boss'){
      // 보스: 큰 6각형 + 회전 링
      ctx.save();ctx.rotate(e.bossTimer||0);
      ctx.fillStyle=fl?'#ff8866':'#660000';poly(6,e.r*.9);ctx.fill();
      ctx.strokeStyle='#ff2200';ctx.lineWidth=3;ctx.stroke();
      // 내부 크로스
      ctx.strokeStyle=fl?'#ff8888':'#880000';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-e.r*.6,0);ctx.lineTo(e.r*.6,0);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-e.r*.6);ctx.lineTo(0,e.r*.6);ctx.stroke();
      ctx.restore();
      // 회전 외곽 링
      ctx.save();ctx.rotate(-(e.bossTimer||0)*1.5);
      ctx.strokeStyle='rgba(255,50,0,.6)';ctx.lineWidth=2;ctx.setLineDash([8,6]);
      ctx.beginPath();ctx.arc(0,0,e.r*1.15,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
      ctx.restore();
    }
    else{ctx.fillStyle=fl?'#ff7766':ec;ctx.beginPath();ctx.ellipse(0,0,e.r*.68,e.r*.88,0,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle=fl?'#ffbbaa':'#3a5020';ctx.beginPath();ctx.arc(0,-e.r*.75,e.r*.44,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(-e.r*.15,-e.r*.8,2.4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.r*.15,-e.r*.8,2.4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=fl?'#ff9988':e.col;ctx.lineWidth=e.r*.32;
    ctx.beginPath();ctx.moveTo(-e.r*.58,0);ctx.lineTo(-e.r*1.05,e.r*.48);ctx.stroke();
    ctx.beginPath();ctx.moveTo(e.r*.58,0);ctx.lineTo(e.r*1.05,e.r*.48);ctx.stroke();
    // 독 파티클 이펙트
    if(e.poisoned&&Math.random()<.3)spawnParticles(e.x,e.y,'#88ff44',1,20,.25);
    // 슬로우 이펙트
    if(e.slowed&&Math.random()<.2)spawnParticles(e.x,e.y,'#aaffff',1,15,.2);
    if(e.type==='sniper'){
      ctx.restore();ctx.save();ctx.translate(e.x,e.y+bobY);
      const sa=Math.atan2(cy-e.y,cx-e.x);
      ctx.strokeStyle='rgba(68,136,255,.2)';ctx.lineWidth=1;ctx.setLineDash([4,6]);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(sa)*150,Math.sin(sa)*150);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.restore();
  }

  // 적 총알
  for(const b of enemyBullets){ctx.shadowColor=b.col;ctx.shadowBlur=6;ctx.fillStyle=b.col;ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();}
  ctx.shadowBlur=0;

  // 파티클
  for(const p of particles){
    const t=p.life/p.maxLife;
    if(p.ring){ctx.strokeStyle=p.col;ctx.lineWidth=2.5*t;ctx.globalAlpha=t*.8;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
    else{ctx.globalAlpha=t*.88;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*t+.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  }

  // ══ OUTPOST ══
  ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();ctx.ellipse(6,10,36,14,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.5)';ctx.fill();
  ctx.save();ctx.rotate(outpostRot);poly(8,30);ctx.fillStyle='#4e4e46';ctx.fill();ctx.strokeStyle='#2e2e28';ctx.lineWidth=3;ctx.stroke();ctx.restore();
  ctx.save();ctx.rotate(outpostRot);poly(8,22);
  const bg=ctx.createLinearGradient(-22,-22,22,22);bg.addColorStop(0,'#d4c898');bg.addColorStop(1,'#8a7848');
  ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle='#5a4e28';ctx.lineWidth=2;ctx.stroke();ctx.restore();
  ctx.fillStyle='#3a3228';ctx.fillRect(-5,6,10,14);ctx.strokeStyle='#1e1a10';ctx.lineWidth=1;ctx.strokeRect(-5,6,10,14);
  ctx.fillStyle='rgba(0,80,40,.7)';ctx.shadowColor='#00ff88';ctx.shadowBlur=3;ctx.fillRect(-3,7,6,5);ctx.shadowBlur=0;
  ctx.fillStyle='#777';ctx.fillRect(2,13,2,4);
  ctx.save();ctx.translate(0,-12);ctx.rotate(outpostRot);
  poly(6,19);const dg=ctx.createLinearGradient(-19,-19,19,12);dg.addColorStop(0,'#e8daa8');dg.addColorStop(1,'#907848');
  ctx.fillStyle=dg;ctx.fill();ctx.strokeStyle='#5a4828';ctx.lineWidth=2.5;ctx.stroke();
  poly(6,17);ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.stroke();
  for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2+Math.PI/6,mx=Math.cos(a)*16,my=Math.sin(a)*16;
    ctx.save();ctx.translate(mx,my);ctx.rotate(a);ctx.fillStyle='rgba(0,100,50,.85)';ctx.shadowColor='#00ee88';ctx.shadowBlur=4;ctx.fillRect(-3,-2,6,4);ctx.shadowBlur=0;ctx.strokeStyle='#222';ctx.lineWidth=.6;ctx.strokeRect(-3,-2,6,4);ctx.restore();}
  poly(6,10);ctx.fillStyle='#b8aa70';ctx.fill();ctx.strokeStyle='#6a5a30';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
  ctx.strokeStyle='#252525';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(15,-4);ctx.lineTo(15,-40);ctx.stroke();
  ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(10,-32);ctx.lineTo(20,-32);ctx.stroke();ctx.beginPath();ctx.moveTo(11,-26);ctx.lineTo(19,-26);ctx.stroke();
  ctx.beginPath();ctx.arc(15,-42,5,0,Math.PI*2);ctx.fillStyle='#1a1a1a';ctx.shadowColor='#ff4400';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.stroke();
  ctx.translate(0,-12);
  ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fillStyle='#252525';ctx.fill();ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.stroke();
  ctx.save();ctx.rotate(turretAngle);
  // 무기별 포탑 시각화
  const wc=getCurWeapon().color;
  ctx.fillStyle='#1c1c1c';ctx.fillRect(-6,-5,10,10);ctx.strokeStyle='#3a3a3a';ctx.lineWidth=1;ctx.strokeRect(-6,-5,10,10);
  if(currentWeaponId==='machinegun'){
    ctx.fillStyle='#161616';ctx.fillRect(2,-5,26,4);ctx.fillRect(2,1,26,4);
    ctx.fillStyle='#222';ctx.fillRect(2,-5.5,8,11);
    ctx.fillStyle='#101010';ctx.fillRect(24,-5,4,4);ctx.fillRect(24,1,4,4);
  } else if(currentWeaponId==='bomb'){
    ctx.fillStyle='#2a2a2a';ctx.fillRect(2,-6,22,12);
    ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(26,0,5,0,Math.PI*2);ctx.fill();
  } else if(currentWeaponId==='laser'){
    ctx.fillStyle='#002244';ctx.fillRect(2,-4,28,8);
    ctx.shadowColor='#00ffff';ctx.shadowBlur=8;ctx.strokeStyle='#00ffff';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(2,0);ctx.lineTo(30,0);ctx.stroke();ctx.shadowBlur=0;
  } else if(currentWeaponId==='poison'){
    ctx.fillStyle='#1a2a10';ctx.fillRect(2,-3,20,6);
    ctx.fillStyle='#88ff44';ctx.beginPath();ctx.arc(24,0,4,0,Math.PI*2);ctx.fill();
  } else if(currentWeaponId==='slime'){
    ctx.fillStyle='#2a3a10';ctx.fillRect(2,-5,16,10);
    ctx.shadowColor='#aaff00';ctx.shadowBlur=6;ctx.fillStyle='rgba(170,255,0,.8)';
    ctx.beginPath();ctx.arc(22,0,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }
  ctx.fillStyle='#2e2e2e';ctx.fillRect(3,-7,6,4);
  ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fillStyle='#2e2e2e';ctx.fill();
  ctx.beginPath();ctx.arc(0,0,2.2,0,Math.PI*2);
  ctx.fillStyle=wc;ctx.shadowColor=wc;ctx.shadowBlur=5;ctx.fill();ctx.shadowBlur=0;
  ctx.restore();
  if(shieldActive){ctx.beginPath();ctx.arc(0,0,40,0,Math.PI*2);ctx.strokeStyle=`rgba(68,136,255,${.5+Math.sin(Date.now()*.01)*.3})`;ctx.lineWidth=4;ctx.stroke();}
  ctx.restore();

  // 플레이어 총알
  const wd=getCurDef();
  for(const b of bullets)wd.drawBullet(ctx,b);

  // Floating texts
  ctx.textAlign='center';
  for(const ft of floatingTexts){
    const t=ft.life/ft.maxLife;
    ctx.globalAlpha=ft.isCrit?Math.min(1,t*2):t;
    const sz=ft.size||13;
    ctx.font=`bold ${sz}px Courier New`;
    ctx.fillStyle=ft.col||'#ffdd00';
    ctx.shadowColor=ft.isCrit?'#ff2200':ft.col||'#ff8800';
    ctx.shadowBlur=ft.isCrit?14:6;
    if(ft.isCrit){ctx.save();ctx.scale(1+Math.sin(ft.life*20)*.08,1+Math.sin(ft.life*20)*.08);}
    ctx.fillText(ft.text,ft.x,ft.y+(ft.isCrit?0:0));
    if(ft.isCrit)ctx.restore();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.textAlign='left';

  // ── 버추얼 조이스틱 ──
  if(joy.active&&currentTab==='fire'){
    const dx=joy.curX-joy.baseX,dy=joy.curY-joy.baseY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const clampedX=joy.baseX+(dist>JOY_R?dx/dist*JOY_R:dx);
    const clampedY=joy.baseY+(dist>JOY_R?dy/dist*JOY_R:dy);
    // 외부 링
    ctx.beginPath();ctx.arc(joy.baseX,joy.baseY,JOY_R,0,Math.PI*2);
    ctx.strokeStyle='rgba(144,238,64,.35)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='rgba(144,238,64,.05)';ctx.fill();
    // 내부 스틱
    ctx.beginPath();ctx.arc(clampedX,clampedY,JOY_R*.38,0,Math.PI*2);
    ctx.fillStyle='rgba(144,238,64,.4)';ctx.fill();
    ctx.strokeStyle='rgba(144,238,64,.7)';ctx.lineWidth=2;ctx.stroke();
    // 조준선
    if(dist>8){
      ctx.strokeStyle='rgba(255,210,50,.15)';ctx.lineWidth=1;ctx.setLineDash([6,10]);
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(turretAngle)*R*.88,cy+Math.sin(turretAngle)*R*.88);
      ctx.stroke();ctx.setLineDash([]);
    }
  }

  ctx.restore();
}

// ── KILL ─────────────────────────────────────────────────────
function killEnemy(idx){
  const e=enemies[idx];e.dead=true;
  spawnParticles(e.x,e.y,'#882200',10,110,.5);spawnParticles(e.x,e.y,'#cc4400',5,75,.32);
  sfx('die');screenShake=Math.max(screenShake,e.type==='giant'?8:4);
  const gd=ENEMY_TYPES[e.type]?.goldDrop||3;gold+=gd;spawnGoldText(e.x,e.y,gd);
  enemies.splice(idx,1);kills++;enemiesLeft--;updateHUD();killMsg(e.type);
  if(enemiesLeft<=0&&waveActive)onWaveClear();
}

// ── GAME FLOW ────────────────────────────────────────────────
window.startGame=function(){
  document.getElementById('overlay').style.display='none';
  CFG.OUTPOST_HP=120;CFG.regenPerSec=0;CFG.meleeDmgMul=1.0;
  hp=120;kills=0;gold=0;waveIdx=0;enemiesLeft=0;waveActive=false;
  if(countdownTimer)clearInterval(countdownTimer);document.getElementById('waveCountdown').style.display='none';
  bullets=[];enemies=[];particles=[];floatingTexts=[];enemyBullets=[];
  screenShake=0;lastFire=0;frenzyActive=false;shieldActive=false;upgradeLevel={};
  SKILLS.forEach(s=>{s.unlocked=false;s.cdLeft=0;});
  initWeaponStates();currentWeaponId='machinegun';
  currentBiome='jungle';biomeTransitioning=false;
  gameRunning=true;isPaused=false;lastTime=performance.now();
  updateHUD();buildAmmoBar();updateAmmoBar();buildSkillBar();updateWeaponHud();setTab('fire');
  cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);
  setTimeout(startWave,800);
};
function gameOver(){
  gameRunning=false;
  showOverlay('OUTPOST LOST','#ff4444',
    `<div class="sgrid">
      <div class="sbox"><div class="sl">WAVE</div><div class="sv">${waveIdx+1}</div></div>
      <div class="sbox"><div class="sl">KILLS</div><div class="sv">${kills}</div></div>
    </div>
    <button class="btn" onclick="continueWithAd()" style="border-color:#ffaa00;color:#ffcc00;margin-bottom:6px">
      📺 광고 보고 이어하기<br><span style="font-size:9px;letter-spacing:1px;opacity:.7">HP 100% 회복</span>
    </button>
    <button class="btn" onclick="startGame()" style="font-size:11px;padding:10px 30px">↺ 처음부터</button>`);
}
window.continueWithAd=function(){
  // [INTEGRATION POINT] 실제 AdMob/광고 SDK 연동 시 이 함수 내부에서 광고 로드/표시
  // Unity 포팅 시: Advertisement.Show("Rewarded", new ShowOptions{...}) 로 대체
  const adOverlay=document.createElement('div');
  adOverlay.style.cssText='position:fixed;inset:0;background:#000;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:Courier New';
  adOverlay.innerHTML=`
    <div style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:12px">AD</div>
    <div style="font-size:18px;letter-spacing:3px;color:#ffaa00">📺 ADVERTISEMENT</div>
    <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:8px">5초 후 이어하기...</div>
    <div id="adCount" style="font-size:42px;font-weight:bold;color:#ffcc00;margin-top:16px">5</div>`;
  document.body.appendChild(adOverlay);
  let t=5;
  const iv=setInterval(()=>{
    t--;document.getElementById('adCount').textContent=t;
    if(t<=0){
      clearInterval(iv);document.body.removeChild(adOverlay);
      // 이어하기: HP 100% 회복 후 재개
      hp=CFG.OUTPOST_HP;updateHUD();
      document.getElementById('overlay').style.display='none';
      currentBiome='jungle';biomeTransitioning=false;
  gameRunning=true;isPaused=false;lastTime=performance.now();
      cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);
    }
  },1000);
};
function winGame(){
  gameRunning=false;
  showOverlay('MISSION COMPLETE','#b8ff50',
    `<div style="color:rgba(255,255,255,.4);font-size:10px;letter-spacing:2px;margin:6px 0">ALL 10 WAVES CLEARED</div>
    <div class="sgrid"><div class="sbox"><div class="sl">KILLS</div><div class="sv">${kills}</div></div><div class="sbox"><div class="sl">GOLD</div><div class="sv">${gold}</div></div></div>
    <button class="btn" onclick="startGame()">▶ PLAY AGAIN</button>`);
}
function showOverlay(t,col,body){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h1 style="color:${col};text-shadow:0 0 30px ${col}">${t}</h1>${body}`;
  ov.style.display='flex';ov.style.flexDirection='column';ov.style.alignItems='center';ov.style.justifyContent='center';
}

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  resize();window.addEventListener('resize',resize);
  setupInput();initWeaponStates();buildAmmoBar();draw();
});
</script>
